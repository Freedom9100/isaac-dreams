<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить артефакт — Сны Исаака</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="admin-layout">

    <!-- сайдбар -->
    <aside class="admin-sidebar" id="admin-sidebar">
        <div class="sidebar-top">
            <span class="sidebar-logo-title">Сны Исаака</span>
            <span class="sidebar-logo-sub">Административная панель</span>
        </div>
        <nav class="sidebar-nav">
            <a href="subjects.html">[ Субъекты ]</a>
            <a href="artifacts.html" class="active">[ Артефакты ]</a>
            <a href="anomalies.html">[ Аномалии ]</a>
        </nav>
        <div class="sidebar-footer">
            <a href="../login.html" class="sidebar-logout">
                <img src="../assets/icons/logout.svg" alt="">
                [ Выход ]
            </a>
        </div>
    </aside>

    <!-- основной контент -->
    <main class="admin-main">

        <!-- мобильный топбар -->
        <div class="admin-topbar">
            <span class="admin-topbar-logo">Сны Исаака</span>
            <button class="admin-burger" id="admin-burger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <div class="admin-page-header">
            <div class="admin-back-wrap">
                <a href="artifacts.html" class="admin-back-link">← Назад</a>
                <h1 class="admin-title">Добавление артефакта</h1>
            </div>
        </div>

        <div class="admin-form-card">
            <form action="#" method="post">

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label" for="artifact-name">Название артефакта</label>
                        <input class="form-input" type="text" id="artifact-name" name="artifact-name" placeholder="Введите название">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="artifact-sector">Привязанный сектор</label>
                        <select class="form-select" id="artifact-sector" name="artifact-sector">
                            <option value="" disabled selected>Выбрать сектор...</option>
                            <option value="1">Сектор 01 — Начало пробуждения</option>
                            <option value="2">Сектор 02 — Зеркальный лабиринт</option>
                            <option value="3">Сектор 03 — Шахта алмазных снов</option>
                            <option value="4">Сектор 04 — Поглощён сном</option>
                            <option value="5">Сектор 05 — Скрыт во тьме</option>
                            <option value="6">Сектор 06 — Скрыт во тьме</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="artifact-desc">Описание артефакта *</label>
                    <textarea class="form-textarea" id="artifact-desc" name="artifact-desc" placeholder="Опишите историю артефакта..."></textarea>
                </div>

                <label class="form-upload-label">Загрузить изображение (PNG/JPG)</label>
                <div class="drop-zone" id="drop-zone">
                    <input type="file" id="file-input" accept=".png,.jpg,.jpeg">
                    <img src="../assets/icons/image-download.svg" alt="" class="drop-zone-icon">
                    <span class="drop-zone-text" id="drop-text">Перетащите файл или нажмите здесь</span>
                    <span class="drop-zone-filename" id="drop-filename"></span>
                </div>

                <label class="form-check">
                    <input type="checkbox" name="active" id="active">
                    <span class="form-check-label">Активировать артефакт</span>
                </label>

                <button type="submit" class="btn btn-dark w-100">Создать артефакт</button>
            </form>
        </div>

    </main>
</div>

<script src="js/admin.js"></script>
</body>
</html>
